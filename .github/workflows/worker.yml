name: AZvsCars Worker

"on":
  workflow_dispatch:
    inputs:
      action:
        description: "Action (generate, flip or stories)"
        type: choice
        options:
          - generate
          - flip
          - stories
        required: true
        default: "generate"
      sid:
        description: "Session ID"
        type: string
        required: true
      post_type:
        description: "Post type (main, quick, war, night, cinematic)"
        type: choice
        options:
          - main
          - quick
          - war
          - night
          - cinematic
        required: false
        default: "main"
      make_reel:
        description: "Make reel? (true/false)"
        type: choice
        options:
          - "false"
          - "true"
        required: false
        default: "false"
      car:
        description: "Car to flip (1 or 2)"
        type: choice
        options:
          - "1"
          - "2"
        required: false
        default: "1"
      auto_publish:
        description: "Auto publish to Instagram? (true/false)"
        type: choice
        options:
          - "false"
          - "true"
        required: false
        default: "false"
      story_files:
        description: "Comma-separated story files for stories action"
        type: string
        required: false
        default: ""
      story_slot:
        description: "Story slot (morning, noon, evening, all)"
        type: choice
        options:
          - morning
          - noon
          - evening
          - all
        required: false
        default: "all"

jobs:
  run-worker:
    runs-on: ubuntu-latest

    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
      ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
      PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
      INGEST_VIA_PAGES: "true"
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Worker
        run: |
          python worker.py \
            --action "${{ github.event.inputs.action }}" \
            --sid "${{ github.event.inputs.sid }}" \
            --post_type "${{ github.event.inputs.post_type }}" \
            --make_reel "${{ github.event.inputs.make_reel }}" \
            --car "${{ github.event.inputs.car }}" \
            --auto_publish "${{ github.event.inputs.auto_publish }}" \
            --story_files "${{ github.event.inputs.story_files }}" \
            --story_slot "${{ github.event.inputs.story_slot }}"
