name: Instagram Automated Poster

concurrency:
  group: azvscars-instagram-publish
  cancel-in-progress: false

on:
  schedule:
    # Monday 09:00 AZT -> 05:00 UTC
    - cron: "0 5 * * 1"
    # Tuesday 13:00 AZT -> 09:00 UTC
    - cron: "0 9 * * 2"
    # Wednesday 19:30 AZT -> 15:30 UTC
    - cron: "30 15 * * 3"
    # Friday 19:30 AZT -> 15:30 UTC
    - cron: "30 15 * * 5"
    # Saturday 20:30 AZT -> 16:30 UTC
    - cron: "30 16 * * 6"
    # Saturday 22:30 AZT -> 18:30 UTC
    - cron: "30 18 * * 6"
    # Sunday 00:30 AZT == Saturday 20:30 UTC
    - cron: "30 20 * * 6"

  workflow_dispatch:
    inputs:
      type:
        description: 'Post Type to generate'
        required: true
        default: 'main'
        type: choice
        options:
          - quick
          - main
          - war
          - night
          - cinematic
          - market
          - night_supercar

jobs:
  post-to-instagram:
    runs-on: ubuntu-latest
    
    env:
      ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
      PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
      INGEST_VIA_PAGES: "true"
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Determine Post Type
        id: set-type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "POST_TYPE=${{ github.event.inputs.type }}" >> "$GITHUB_ENV"
            echo "POSTING_SLOT=manual" >> "$GITHUB_ENV"
          else
            if [[ "${{ github.event.schedule }}" == "0 5 * * 1" ]]; then
              echo "POST_TYPE=quick" >> "$GITHUB_ENV"
              echo "POSTING_SLOT=mon_0900_buying" >> "$GITHUB_ENV"
            elif [[ "${{ github.event.schedule }}" == "0 9 * * 2" ]]; then
              echo "POST_TYPE=market" >> "$GITHUB_ENV"
              echo "POSTING_SLOT=tue_1300_market" >> "$GITHUB_ENV"
            elif [[ "${{ github.event.schedule }}" == "30 15 * * 3" ]]; then
              echo "POST_TYPE=main" >> "$GITHUB_ENV"
              echo "POSTING_SLOT=wed_1930_main" >> "$GITHUB_ENV"
            elif [[ "${{ github.event.schedule }}" == "30 15 * * 5" ]]; then
              echo "POST_TYPE=war" >> "$GITHUB_ENV"
              echo "POSTING_SLOT=fri_1930_war" >> "$GITHUB_ENV"
            elif [[ "${{ github.event.schedule }}" == "30 16 * * 6" ]]; then
              echo "POST_TYPE=night_supercar" >> "$GITHUB_ENV"
              echo "POSTING_SLOT=sat_2030_supercar" >> "$GITHUB_ENV"
            elif [[ "${{ github.event.schedule }}" == "30 18 * * 6" ]]; then
              echo "POST_TYPE=night_supercar" >> "$GITHUB_ENV"
              echo "POSTING_SLOT=sat_2230_supercar" >> "$GITHUB_ENV"
            elif [[ "${{ github.event.schedule }}" == "30 20 * * 6" ]]; then
              echo "POST_TYPE=night_supercar" >> "$GITHUB_ENV"
              echo "POSTING_SLOT=sun_0030_supercar" >> "$GITHUB_ENV"
            else
              echo "POST_TYPE=main" >> "$GITHUB_ENV"
              echo "POSTING_SLOT=manual" >> "$GITHUB_ENV"
            fi
          fi

      - name: Humanize Scheduled Time
        if: github.event_name == 'schedule'
        run: |
          seed="$(TZ=Asia/Baku date +%Y%m%d)-${{ github.event.schedule }}"
          jitter=$(( 180 + ( $(printf "%s" "$seed" | cksum | awk '{print $1}') % 1320 ) ))
          echo "Natural schedule jitter: ${jitter}s"
          sleep "$jitter"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Automated Post
        run: |
          SID="auto$(date +%Y%m%d%H%M%S)"
          MAKE_REEL="false"
          if [[ "$POST_TYPE" == "quick" || "$POST_TYPE" == "war" || "$POST_TYPE" == "night" || "$POST_TYPE" == "cinematic" || "$POST_TYPE" == "market" || "$POST_TYPE" == "night_supercar" ]]; then
            MAKE_REEL="true"
          fi
          python worker.py \
            --action generate \
            --sid "$SID" \
            --post_type "$POST_TYPE" \
            --make_reel "$MAKE_REEL" \
            --auto_publish true
