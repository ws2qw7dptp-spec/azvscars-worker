name: Instagram Automated Poster

concurrency:
  group: azvscars-instagram-publish
  cancel-in-progress: false

on:
  schedule:
    # 09:00 AZT -> 05:00 UTC (Daily Debate Reel)
    - cron: "0 5 * * *"
    # 19:30 AZT -> 15:30 UTC (alternates Market Reel / Crazy Cars Reel)
    - cron: "30 15 * * *"

  workflow_dispatch:
    inputs:
      type:
        description: 'Post Type to generate'
        required: true
        default: 'main'
        type: choice
        options:
          - quick
          - main
          - market
          - war
          - night
          - cinematic

jobs:
  post-to-instagram:
    runs-on: ubuntu-latest
    
    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
      ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
      PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
      INGEST_VIA_PAGES: "true"
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Determine Post Type
        id: set-type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "POST_TYPE=${{ github.event.inputs.type }}" >> "$GITHUB_ENV"
          else
            if [[ "${{ github.event.schedule }}" == "0 5 * * *" ]]; then
              echo "POST_TYPE=quick" >> "$GITHUB_ENV"
            elif [[ "${{ github.event.schedule }}" == "30 15 * * *" ]]; then
              DOW="$(TZ=Asia/Baku date +%u)"
              if [[ "$DOW" == "1" || "$DOW" == "3" || "$DOW" == "5" || "$DOW" == "7" ]]; then
                echo "POST_TYPE=market" >> "$GITHUB_ENV"
              else
                echo "POST_TYPE=cinematic" >> "$GITHUB_ENV"
              fi
            else
              echo "POST_TYPE=main" >> "$GITHUB_ENV"
            fi
          fi

      - name: Humanize Scheduled Time
        if: github.event_name == 'schedule'
        run: |
          seed="$(TZ=Asia/Baku date +%Y%m%d)-${{ github.event.schedule }}"
          jitter=$(( 180 + ( $(printf "%s" "$seed" | cksum | awk '{print $1}') % 1320 ) ))
          echo "Natural schedule jitter: ${jitter}s"
          sleep "$jitter"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Automated Post
        run: |
          SID="auto$(date +%Y%m%d%H%M%S)"
          python worker.py \
            --action generate \
            --sid "$SID" \
            --post_type "$POST_TYPE" \
            --make_reel "true" \
            --auto_publish true
