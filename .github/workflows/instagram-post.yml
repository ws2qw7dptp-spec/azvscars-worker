name: Instagram Automated Poster

concurrency:
  group: azvscars-instagram-publish
  cancel-in-progress: false

on:
  schedule:
    # 09:00 AZT -> 05:00 UTC (Sürücü Seçimi)
    - cron: "0 5 * * *"
    # 13:00 AZT -> 09:00 UTC (Real Avto Döyüş)
    - cron: "0 9 * * *"
    # 19:30 AZT -> 15:30 UTC (Şərh Savaşı)
    - cron: "30 15 * * *"
    # 22:45 AZT -> 18:45 UTC (Gecə Döyüşü)
    - cron: "45 18 * * *"

  workflow_dispatch:
    inputs:
      type:
        description: 'Post Type to generate'
        required: true
        default: 'main'
        type: choice
        options:
          - quick
          - main
          - war
          - night
          - cinematic

jobs:
  post-to-instagram:
    runs-on: ubuntu-latest
    
    env:
      ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
      PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
      INGEST_VIA_PAGES: "true"
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Determine Post Type
        id: set-type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "POST_TYPE=${{ github.event.inputs.type }}" >> "$GITHUB_ENV"
          else
            if [[ "${{ github.event.schedule }}" == "0 5 * * *" ]]; then
              echo "POST_TYPE=quick" >> "$GITHUB_ENV"
            elif [[ "${{ github.event.schedule }}" == "0 9 * * *" ]]; then
              echo "POST_TYPE=main" >> "$GITHUB_ENV"
            elif [[ "${{ github.event.schedule }}" == "30 15 * * *" ]]; then
              echo "POST_TYPE=war" >> "$GITHUB_ENV"
            elif [[ "${{ github.event.schedule }}" == "45 18 * * *" ]]; then
              echo "POST_TYPE=cinematic" >> "$GITHUB_ENV"
            else
              echo "POST_TYPE=main" >> "$GITHUB_ENV"
            fi
          fi

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Automated Post
        run: |
          SID="auto$(date +%Y%m%d%H%M%S)"
          MAKE_REEL="false"
          if [[ "$POST_TYPE" == "quick" || "$POST_TYPE" == "war" || "$POST_TYPE" == "night" || "$POST_TYPE" == "cinematic" ]]; then
            MAKE_REEL="true"
          fi
          python worker.py \
            --action generate \
            --sid "$SID" \
            --post_type "$POST_TYPE" \
            --make_reel "$MAKE_REEL" \
            --auto_publish true
