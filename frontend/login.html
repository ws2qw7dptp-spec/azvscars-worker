<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZvsCars — Giriş</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red: #ff1f3a;
  --red-dim: rgba(255,31,58,.12);
  --dark: #060608;
  --surface: #0e0e12;
  --card: #13131a;
  --border: rgba(255,255,255,.08);
  --border-hover: rgba(255,31,58,.4);
  --text: #f2f2f7;
  --muted: #6e6e85;
  --muted2: #3a3a50;
}

html, body {
  height: 100%;
  background: var(--dark);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}

/* ── Animated background ── */
.bg {
  position: fixed;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}
.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: .35;
  animation: drift 12s ease-in-out infinite alternate;
}
.bg-orb-1 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, #ff1f3a 0%, transparent 70%);
  top: -200px; left: -150px;
  animation-delay: 0s;
}
.bg-orb-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #8b1aff 0%, transparent 70%);
  bottom: -100px; right: -100px;
  animation-delay: -6s;
}
.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size: 60px 60px;
}
@keyframes drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(30px, 20px) scale(1.08); }
}

/* ── Page layout ── */
.page {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
}

/* ── Card ── */
.card {
  width: 420px;
  background: rgba(19, 19, 26, 0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 44px 44px;
  box-shadow:
    0 0 0 1px rgba(255,31,58,.05),
    0 40px 100px rgba(0,0,0,.7),
    0 0 80px rgba(255,31,58,.04);
  animation: cardIn .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(24px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── Logo ── */
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 40px;
}
.logo-badge {
  background: var(--red);
  color: #fff;
  font-weight: 900;
  font-size: 13px;
  padding: 6px 11px;
  border-radius: 8px;
  letter-spacing: 1.5px;
  box-shadow: 0 4px 20px rgba(255,31,58,.4);
}
.logo-text {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -.5px;
  color: var(--text);
}
.logo-text em {
  color: var(--red);
  font-style: normal;
}

/* ── Heading ── */
.heading { margin-bottom: 32px; }
.heading h1 {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -.5px;
  margin-bottom: 6px;
}
.heading p {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.5;
}

/* ── Form ── */
.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .9px;
  margin-bottom: 9px;
}
.input-wrap { position: relative; }
.input-wrap svg {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted2);
  pointer-events: none;
  transition: color .2s;
}
.input-wrap:focus-within svg { color: var(--red); }
input {
  width: 100%;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  padding: 13px 16px 13px 42px;
  border-radius: 12px;
  outline: none;
  transition: border-color .2s, background .2s, box-shadow .2s;
}
input:focus {
  border-color: var(--red);
  background: rgba(255,31,58,.04);
  box-shadow: 0 0 0 3px rgba(255,31,58,.12);
}
input::placeholder { color: var(--muted2); }

/* ── Button ── */
.btn {
  position: relative;
  width: 100%;
  background: var(--red);
  color: #fff;
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 700;
  padding: 15px;
  border-radius: 13px;
  cursor: pointer;
  margin-top: 10px;
  letter-spacing: .3px;
  overflow: hidden;
  transition: transform .15s, box-shadow .2s;
  box-shadow: 0 4px 24px rgba(255,31,58,.35);
}
.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.12) 0%, transparent 60%);
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,31,58,.45); }
.btn:active { transform: translateY(0); box-shadow: 0 4px 16px rgba(255,31,58,.3); }
.btn.loading { opacity: .7; pointer-events: none; }

/* ── Error ── */
.error-msg {
  display: none;
  margin-top: 14px;
  padding: 12px 16px;
  background: rgba(255,31,58,.1);
  border: 1px solid rgba(255,31,58,.25);
  border-radius: 10px;
  color: #ff6b7a;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  animation: shake .3s ease;
}
@keyframes shake {
  0%,100%{ transform:translateX(0); }
  25%    { transform:translateX(-6px); }
  75%    { transform:translateX(6px); }
}

/* ── Footer ── */
.card-footer {
  margin-top: 28px;
  text-align: center;
  font-size: 12px;
  color: var(--muted2);
}
.card-footer span { color: var(--red); font-weight: 600; }
</style>
</head>
<body>

<div class="bg">
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
</div>

<div class="page">
  <div class="card">
    <div class="logo">
      <div class="logo-badge">VS</div>
      <div class="logo-text">AZ<em>vs</em>Cars</div>
    </div>

    <div class="heading">
      <h1>Xoş gəldiniz 👋</h1>
      <p>İdarə panelinə daxil olmaq üçün məlumatlarınızı daxil edin.</p>
    </div>

    <div class="field">
      <label for="email">E-poçt</label>
      <div class="input-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <input type="email" id="email" placeholder="admin@email.com" autocomplete="email">
      </div>
    </div>

    <div class="field">
      <label for="password">Şifrə</label>
      <div class="input-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">
      Daxil ol →
    </button>

    <div class="error-msg" id="err"></div>

    <div class="card-footer">
      <span>AZvsCars</span> Admin Panel · Cloudflare Pages
    </div>
  </div>
</div>

<script>
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err = document.getElementById('err');
    const btn = document.getElementById('loginBtn');
    err.style.display = 'none';

    if (!email || !password) {
      err.textContent = 'Zəhmət olmasa bütün sahələri doldurun.';
      err.style.display = 'block';
      return;
    }

    btn.textContent = 'Yoxlanılır…';
    btn.classList.add('loading');

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, password})
      });
      if (res.ok) {
        localStorage.setItem('admin_token', password);
        btn.textContent = '✓ Uğurlu! Yönləndirilir…';
        setTimeout(() => window.location.href = 'index.html', 600);
      } else {
        const d = await res.json();
        err.textContent = d.error || 'Giriş uğursuz oldu.';
        err.style.display = 'block';
        btn.textContent = 'Daxil ol →';
        btn.classList.remove('loading');
      }
    } catch(e) {
      err.textContent = 'Server ilə əlaqə qurulmadı. Yenidən cəhd edin.';
      err.style.display = 'block';
      btn.textContent = 'Daxil ol →';
      btn.classList.remove('loading');
    }
  }
</script>
</body>
</html>
